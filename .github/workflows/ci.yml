name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go:
          - "1.25"
          - "1.26"
          - "master"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go == 'master' && 'stable' || matrix.go }}
          check-latest: ${{ matrix.go == 'master' }}

      - name: Run tests
        run: go test -v -race ./...
